name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    # Lint and build backend
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Install backend dependencies
      run: npm ci
      working-directory: ./backend

    - name: Lint backend
      run: npm run lint
      working-directory: ./backend
      continue-on-error: true

    - name: Install worker dependencies
      run: npm ci
      working-directory: ./worker

    - name: Install frontend dependencies
      run: npm ci
      working-directory: ./frontend

    - name: Build frontend
      run: npm run build
      working-directory: ./frontend
      env:
        VITE_API_URL: https://api.ai-task-platform.example.com/api

    # Docker build and push
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    - name: Build and push backend image
      uses: docker/build-push-action@v4
      with:
        context: ./backend
        push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        tags: ${{ secrets.DOCKER_USERNAME }}/ai-task-backend:latest
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    - name: Build and push worker image
      uses: docker/build-push-action@v4
      with:
        context: ./worker
        push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        tags: ${{ secrets.DOCKER_USERNAME }}/ai-task-worker:latest
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    - name: Build and push frontend image
      uses: docker/build-push-action@v4
      with:
        context: ./frontend
        push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        tags: ${{ secrets.DOCKER_USERNAME }}/ai-task-frontend:latest
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    # Update Kubernetes deployment images
    - name: Update backend deployment image
      run: |
        sed -i "s|your-registry/ai-task-backend:latest|${{ secrets.DOCKER_USERNAME }}/ai-task-backend:latest|g" infra/backend/deployment.yaml
        cat infra/backend/deployment.yaml
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    - name: Update worker deployment image
      run: |
        sed -i "s|your-registry/ai-task-worker:latest|${{ secrets.DOCKER_USERNAME }}/ai-task-worker:latest|g" infra/worker/deployment.yaml
        cat infra/worker/deployment.yaml
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    - name: Update frontend deployment image
      run: |
        sed -i "s|your-registry/ai-task-frontend:latest|${{ secrets.DOCKER_USERNAME }}/ai-task-frontend:latest|g" infra/frontend/deployment.yaml
        cat infra/frontend/deployment.yaml
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    - name: Commit and push updated images
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add infra/*/deployment.yaml infra/**/deployment.yaml
        git commit -m "chore: update docker image tags [skip ci]" || true
        git push
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
